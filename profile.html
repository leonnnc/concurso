<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Mi Perfil — PhotoContest CDF</title>
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="gallery.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    .profile-page { min-height: 100vh; padding: calc(var(--nav-h) + 48px) 24px 80px; }
    .profile-card {
      max-width: 560px; margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-lg);
      padding: 40px;
      display: flex; flex-direction: column; gap: 24px;
    }
    .profile-avatar-big {
      width: 80px; height: 80px;
      background: var(--gold); color: #0a0a0b;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 2.5rem;
      margin: 0 auto;
    }
    .profile-alias { text-align: center; font-family: var(--font-display); font-size: 2rem; color: var(--gold); }
    .profile-email { text-align: center; font-size: 13px; color: var(--text-3); font-family: var(--font-mono); }
    .profile-stats { display: flex; gap: 16px; justify-content: center; }
    .profile-stat {
      background: var(--surface-2); border-radius: var(--radius);
      padding: 16px 24px; text-align: center; flex: 1;
    }
    .profile-stat .num { font-family: var(--font-display); font-size: 2rem; color: var(--gold); }
    .profile-stat .lbl { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); letter-spacing: 1px; }
    .profile-form { display: flex; flex-direction: column; gap: 16px; }
    .profile-section-title { font-size: 13px; font-weight: 600; color: var(--text-3); letter-spacing: 2px; text-transform: uppercase; font-family: var(--font-mono); }
    .profile-actions { display: flex; gap: 12px; justify-content: flex-end; }
  </style>
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">PhotoCDF</span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="gallery.html" class="nav-link">Mi galería</a>
    </div>
    <div class="nav-actions" id="navActions">
      <button class="btn-ghost" onclick="showModal('loginModal')">Entrar</button>
      <button class="btn-primary" onclick="showModal('registerModal')">Participar</button>
    </div>
  </nav>

  <div class="profile-page container">
    <div class="profile-card" id="profileCard">
      <div class="profile-avatar-big" id="profileAvatar">?</div>
      <p class="profile-alias" id="profileAlias">@—</p>
      <p class="profile-email" id="profileEmail">—</p>

      <div class="profile-stats">
        <div class="profile-stat">
          <div class="num" id="profilePhotoCount">0</div>
          <div class="lbl">Fotos subidas</div>
        </div>
        <div class="profile-stat">
          <div class="num" id="profileRemaining">15</div>
          <div class="lbl">Disponibles</div>
        </div>
        <div class="profile-stat">
          <div class="num" id="profileMember">—</div>
          <div class="lbl">Miembro desde</div>
        </div>
      </div>

      <div class="profile-form">
        <p class="profile-section-title">Editar perfil</p>
        <div class="form-group">
          <label>Alias</label>
          <input type="text" id="editAlias" placeholder="@tu_alias" minlength="3" />
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="tel" id="editPhone" placeholder="+51 999 999 999" />
        </div>
        <div id="profileError" class="form-error hidden"></div>
        <div class="profile-actions">
          <button class="btn-ghost" onclick="handleLogout()">Cerrar sesión</button>
          <button class="btn-primary" onclick="saveProfile()">Guardar cambios</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc, getDoc, updateDoc, collection, query, where, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      window.__currentUser = user;
      const snap = await getDoc(doc(db, "users", user.uid));
      const profile = snap.data();
      window.__userProfile = profile;

      const alias = profile?.alias || user.email.split("@")[0];
      document.getElementById("profileAvatar").textContent = alias[0].toUpperCase();
      document.getElementById("profileAlias").textContent = "@" + alias;
      document.getElementById("profileEmail").textContent = user.email;
      document.getElementById("editAlias").value = alias;
      document.getElementById("editPhone").value = profile?.phone || "";

      // Contar fotos
      const q = query(collection(db, "photos"), where("uid", "==", user.uid));
      const photosSnap = await getDocs(q);
      const count = photosSnap.size;
      document.getElementById("profilePhotoCount").textContent = count;
      document.getElementById("profileRemaining").textContent = Math.max(0, 15 - count);

      // Fecha de registro
      if (profile?.createdAt?.toDate) {
        document.getElementById("profileMember").textContent =
          profile.createdAt.toDate().toLocaleDateString("es-PE", { month: "short", year: "numeric" });
      }

      // Actualizar nav
      window.dispatchEvent(new CustomEvent("authStateChanged", { detail: { user } }));
    });

    window.saveProfile = async function() {
      const user = window.__currentUser;
      if (!user) return;
      const alias = document.getElementById("editAlias").value.trim().replace(/^@/, "");
      const phone = document.getElementById("editPhone").value.trim();
      const errEl = document.getElementById("profileError");
      errEl.classList.add("hidden");

      if (alias.length < 3) {
        errEl.textContent = "El alias debe tener al menos 3 caracteres.";
        errEl.classList.remove("hidden");
        return;
      }
      try {
        await updateDoc(doc(db, "users", user.uid), { alias, phone });
        document.getElementById("profileAvatar").textContent = alias[0].toUpperCase();
        document.getElementById("profileAlias").textContent = "@" + alias;
        showToast("Perfil actualizado.", "success");
      } catch (e) {
        errEl.textContent = "Error al guardar. Intenta de nuevo.";
        errEl.classList.remove("hidden");
      }
    };
  </script>
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
  <script src="ui.js"></script>
</body>
</html>
